name: Build Desktop (Tauri)

on:
  workflow_dispatch:             # 手动触发：Actions → 选中本 workflow → Run workflow
  push:
    branches: [main, master]
    paths:
      - 'desktop/**'

env:
  CARGO_TERM_COLOR: always
  WORK_DIR: desktop

jobs:
  build:
    runs-on: windows-latest      # 自带 VS 2022 + MSVC 工具链

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.WORK_DIR }}/package-lock.json

      - name: Setup Rust MSVC
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc
          components: rust-src

      - name: Install frontend deps
        run: npm ci
        working-directory: ${{ env.WORK_DIR }}

      - name: Build web frontend
        run: npm run build
        working-directory: ${{ env.WORK_DIR }}

      - name: Build Desktop (Tauri)
        run: npm run tauri build -- --verbose
        working-directory: ${{ env.WORK_DIR }}

      - name: Upload .exe + .msi
        uses: actions/upload-artifact@v4
        with:
          name: jwbuddy-desktop-windows
          path: |
            ${{ env.WORK_DIR }}/src-tauri/target/release/jwbuddy.exe
            ${{ env.WORK_DIR }}/src-tauri/target/release/*.msi
            ${{ env.WORK_DIR }}/src-tauri/target/release/bundle/msi/*.msi
            ${{ env.WORK_DIR }}/src-tauri/target/release/bundle/nsis/*.exe
          compression-level: 0
          if-no-files-found: warn
